<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Variable Inspector</title>
<style>
    :root {
        --bg: #1e1e1e;
        --bg2: #252526;
        --bg3: #2d2d2d;
        --fg: #cccccc;
        --fg2: #999999;
        --accent: #007acc;
        --accent-hover: #1a8ad4;
        --success: #4ec9b0;
        --error: #f44747;
        --warning: #cca700;
        --border: #3c3c3c;
        --code-bg: #1a1a2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        color: var(--fg);
        background: var(--bg);
        padding: 12px;
        line-height: 1.5;
    }

    /* ── Header ─────────────────────── */
    .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 12px;
    }
    .header .icon { font-size: 18px; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header .status-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--fg2);
        margin-left: auto;
    }
    .header .status-dot.active { background: var(--success); }
    .header .status-dot.error { background: var(--error); }

    /* ── Variable Display ───────────── */
    .variable-section {
        background: var(--bg2);
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 12px;
    }
    .variable-label {
        font-size: 11px;
        color: var(--fg2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
    }
    .variable-name {
        font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        font-size: 16px;
        color: var(--success);
        word-break: break-all;
    }
    .variable-name.empty { color: var(--fg2); font-style: italic; font-size: 13px; }
    .variable-meta {
        font-size: 11px;
        color: var(--fg2);
        margin-top: 2px;
    }
    .variable-error {
        display: none;
        margin-top: 6px;
        font-size: 12px;
        color: var(--error);
    }
    .variable-error.visible {
        display: block;
    }
    .variable-meta .type-badge {
        display: inline-block;
        background: var(--accent);
        color: white;
        padding: 1px 6px;
        border-radius: 3px;
        font-size: 10px;
        font-weight: 600;
        margin-left: 4px;
    }
    .toggle-label {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .toggle-label label {
        cursor: pointer;
        margin: 0;
    }

    /* ── Mapping Controls ───────────── */
    .section { margin-bottom: 12px; }
    .section-title {
        font-size: 11px;
        color: var(--fg2);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
    }

    .mode-buttons {
        display: flex;
        gap: 4px;
    }
    .mode-btn {
        flex: 1;
        padding: 5px 8px;
        border: 1px solid var(--border);
        border-radius: 4px;
        background: var(--bg3);
        color: var(--fg2);
        cursor: pointer;
        font-size: 12px;
        transition: all 0.15s;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--fg); }
    .mode-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
    }

    .range-row {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-top: 8px;
    }
    .range-row label {
        font-size: 12px;
        color: var(--fg2);
        display: flex;
        align-items: center;
        gap: 4px;
    }
    .range-row input[type="number"] {
        width: 70px;
        padding: 3px 6px;
        border: 1px solid var(--border);
        border-radius: 3px;
        background: var(--bg3);
        color: var(--fg);
        font-size: 12px;
    }
    .range-row input[type="number"]:focus {
        outline: none;
        border-color: var(--accent);
    }

    .checkbox-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
    }
    .checkbox-row label {
        font-size: 12px;
        color: var(--fg2);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    /* ── Pixel Readback ─────────────── */
    .pixel-section {
        background: var(--bg2);
        border-radius: 6px;
        padding: 10px 12px;
        margin-bottom: 12px;
        transition: opacity 0.15s;
    }
    .pixel-row {
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .color-swatch {
        width: 32px;
        height: 32px;
        border-radius: 4px;
        border: 1px solid var(--border);
        background: black;
        flex-shrink: 0;
    }
    .pixel-values {
        font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        font-size: 11px;
        line-height: 1.6;
    }
    .pixel-values .ch-r { color: #f44747; }
    .pixel-values .ch-g { color: #4ec9b0; }
    .pixel-values .ch-b { color: #569cd6; }
    .pixel-values .ch-a { color: #999; }

    /* ── Histogram ─────────────────────── */
    .histogram-section {
        background: var(--bg2);
        border-radius: 6px;
        padding: 10px 12px;
        margin-top: 12px;
        transition: opacity 0.15s;
    }
    .histogram-section .variable-label {
        margin-bottom: 6px;
    }
    .histogram-canvas-wrap {
        position: relative;
        width: 100%;
        height: 100px;
        background: var(--bg);
        border-radius: 4px;
        border: 1px solid var(--border);
        overflow: hidden;
    }
    .histogram-canvas-wrap canvas {
        display: block;
        width: 100%;
        height: 100%;
    }
    .histogram-rate-controls {
        position: absolute;
        right: 6px;
        bottom: 6px;
        display: flex;
        gap: 2px;
        z-index: 1;
    }
    .histogram-rate-btn {
        background: transparent;
        border: 1px solid rgba(128, 128, 128, 0.3);
        color: inherit;
        padding: 1px 6px;
        font-size: 10px;
        font-family: 'Consolas', 'Menlo', monospace;
        border-radius: 3px;
        cursor: pointer;
        line-height: 16px;
    }
    .histogram-rate-btn.active {
        background: rgba(128, 128, 128, 0.25);
        border-color: rgba(128, 128, 128, 0.5);
    }
    .histogram-rate-btn:hover {
        background: rgba(128, 128, 128, 0.15);
    }
    .histogram-stats {
        display: flex;
        justify-content: space-between;
        font-size: 10px;
        color: var(--fg2);
        font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        margin-top: 3px;
    }
</style>
</head>
<body>

<div class="header">
    <span class="icon">🔬</span>
    <h1>Variable Inspector</h1>
    <span class="status-dot" id="statusDot"></span>
</div>

<div class="variable-section">
    <div class="variable-label">Inspecting</div>
    <div class="variable-name empty" id="varName">Select an expression in the editor</div>
    <div class="variable-meta" id="varMeta"></div>
    <div class="variable-error" id="varError"></div>
</div>

<div class="section">
    <div class="section-title">Mapping Mode</div>
    <div class="mode-buttons">
        <button class="mode-btn active" data-mode="linear">linear</button>
        <button class="mode-btn" data-mode="sigmoid">sigmoid</button>
        <button class="mode-btn" data-mode="log">log</button>
    </div>
    <div class="range-row">
        <label>Min <input type="number" id="rangeMin" value="0" step="0.1" /></label>
        <label>Max <input type="number" id="rangeMax" value="1" step="0.1" /></label>
    </div>
    <div class="checkbox-row">
        <label>
            <input type="checkbox" id="oorToggle" />
            Highlight out-of-range
        </label>
    </div>
    <div class="checkbox-row">
        <label>
            <input type="checkbox" id="compareToggle" />
            Compare mode (raw values)
        </label>
    </div>
</div>

<div class="pixel-section" id="pixelSection">
    <div class="variable-label toggle-label">
        <input type="checkbox" id="hoverToggle" checked />
        <label for="hoverToggle">Pixel Value (hover over preview)</label>
    </div>
    <div class="pixel-row">
        <div class="color-swatch" id="colorSwatch"></div>
        <div class="pixel-values" id="pixelValues">
            <span class="ch-r">R: —</span><br/>
            <span class="ch-g">G: —</span><br/>
            <span class="ch-b">B: —</span><br/>
            <span class="ch-a">A: —</span>
        </div>
    </div>
</div>

<div class="histogram-section" id="histogramSection">
    <div class="variable-label toggle-label">
        <input type="checkbox" id="histogramToggle" checked />
        <label for="histogramToggle">Histogram</label>
    </div>
    <div class="histogram-canvas-wrap">
        <canvas id="histogramCanvas"></canvas>
        <div class="histogram-rate-controls">
            <button class="histogram-rate-btn active" data-interval-ms="1000">1Hz</button>
            <button class="histogram-rate-btn" data-interval-ms="200">5Hz</button>
            <button class="histogram-rate-btn" data-interval-ms="100">10Hz</button>
        </div>
    </div>
    <div class="histogram-stats">
        <span id="histMin">0.00</span>
        <span id="histSamples"></span>
        <span id="histMax">1.00</span>
    </div>
</div>

<script>
(function () {
    // Acquire VSCode API
    const vscode = (typeof acquireVsCodeApi === 'function') ? acquireVsCodeApi() : null;

    // DOM refs
    const varNameEl = document.getElementById('varName');
    const varMetaEl = document.getElementById('varMeta');
    const varErrorEl = document.getElementById('varError');
    const statusDot = document.getElementById('statusDot');
    const colorSwatch = document.getElementById('colorSwatch');
    const pixelValues = document.getElementById('pixelValues');
    const rangeMin = document.getElementById('rangeMin');
    const rangeMax = document.getElementById('rangeMax');
    const oorToggle = document.getElementById('oorToggle');
    const compareToggle = document.getElementById('compareToggle');
    const modeButtons = document.querySelectorAll('.mode-btn');
    const hoverToggle = document.getElementById('hoverToggle');
    const pixelSection = document.getElementById('pixelSection');
    const histogramToggle = document.getElementById('histogramToggle');
    const histogramSection = document.getElementById('histogramSection');
    const histogramRateButtons = document.querySelectorAll('.histogram-rate-btn');
    const histCanvas = document.getElementById('histogramCanvas');
    const histCtx = histCanvas ? histCanvas.getContext('2d') : null;
    const histMinEl = document.getElementById('histMin');
    const histMaxEl = document.getElementById('histMax');
    const histSamplesEl = document.getElementById('histSamples');

    const DEFAULT_HISTOGRAM_INTERVAL_MS = 1000;
    let currentMode = 'linear';
    let currentHistogramIntervalMs = DEFAULT_HISTOGRAM_INTERVAL_MS;
    let lastHistogram = null;

    function setHoverUi(enabled) {
        pixelSection.style.opacity = enabled ? '1' : '0.5';
    }

    function setHistogramUi(enabled) {
        histogramSection.style.opacity = enabled ? '1' : '0.5';
    }

    function normalizeHistogramInterval(intervalMs) {
        const numericInterval = Number(intervalMs);
        return numericInterval === 200 || numericInterval === 100 || numericInterval === 1000
            ? numericInterval
            : DEFAULT_HISTOGRAM_INTERVAL_MS;
    }

    function setHistogramIntervalUi(intervalMs) {
        currentHistogramIntervalMs = normalizeHistogramInterval(intervalMs);
        histogramRateButtons.forEach(btn => {
            btn.classList.toggle('active', Number(btn.dataset.intervalMs) === currentHistogramIntervalMs);
        });
    }

    function applyInspectorState(mapping, compareEnabled, hoverEnabled, histogramEnabled, histogramIntervalMs) {
        const nextMapping = mapping || {};
        const nextMode = nextMapping.mode || 'linear';
        currentMode = nextMode;
        modeButtons.forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === nextMode);
        });
        rangeMin.value = String(typeof nextMapping.min === 'number' ? nextMapping.min : 0);
        rangeMax.value = String(typeof nextMapping.max === 'number' ? nextMapping.max : 1);
        oorToggle.checked = !!nextMapping.highlightOutOfRange;
        compareToggle.checked = !!compareEnabled;
        hoverToggle.checked = !!hoverEnabled;
        histogramToggle.checked = histogramEnabled !== false;
        setHoverUi(hoverToggle.checked);
        setHistogramUi(histogramToggle.checked);
        setHistogramIntervalUi(histogramIntervalMs);
        if (lastHistogram) drawHistogram(lastHistogram);
    }

    function applyStatus(message, status) {
        statusDot.className = 'status-dot';
        varErrorEl.textContent = '';
        varErrorEl.classList.remove('visible');

        if (status === 'ok') {
            statusDot.classList.add('active');
        } else if (status === 'error') {
            statusDot.classList.add('error');
            if (message) {
                varErrorEl.textContent = message;
                varErrorEl.classList.add('visible');
            }
        }
    }

    // ── Mapping change broadcast ───────────────────
    function broadcastMapping() {
        if (!vscode) return;
        if (lastHistogram) drawHistogram(lastHistogram);
        vscode.postMessage({
            command: 'setMapping',
            mapping: {
                mode: currentMode,
                min: parseFloat(rangeMin.value) || 0,
                max: parseFloat(rangeMax.value) || 1,
                highlightOutOfRange: oorToggle.checked
            }
        });
    }

    // Mode buttons
    modeButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            modeButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMode = btn.dataset.mode;
            broadcastMapping();
        });
    });

    // Range inputs
    rangeMin.addEventListener('change', broadcastMapping);
    rangeMax.addEventListener('change', broadcastMapping);
    oorToggle.addEventListener('change', broadcastMapping);

    // Compare toggle
    compareToggle.addEventListener('change', () => {
        if (vscode) {
            vscode.postMessage({ command: 'setCompare', enabled: compareToggle.checked });
        }
    });

    // Hover toggle
    hoverToggle.addEventListener('change', () => {
        const enabled = hoverToggle.checked;
        setHoverUi(enabled);
        if (vscode) {
            vscode.postMessage({ command: 'setHoverEnabled', enabled: enabled });
        }
    });

    histogramToggle.addEventListener('change', () => {
        const enabled = histogramToggle.checked;
        setHistogramUi(enabled);
        if (vscode) {
            vscode.postMessage({ command: 'setHistogramEnabled', enabled: enabled });
        }
    });

    histogramRateButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            const intervalMs = normalizeHistogramInterval(btn.dataset.intervalMs);
            setHistogramIntervalUi(intervalMs);
            if (vscode) {
                vscode.postMessage({ command: 'setHistogramInterval', intervalMs: intervalMs });
            }
        });
    });

    // ── Incoming messages ──────────────────────────
    window.addEventListener('message', event => {
        const msg = event.data;
        switch (msg.command) {
            case 'syncState':
                applyInspectorState(msg.mapping, msg.compareEnabled, msg.hoverEnabled, msg.histogramEnabled, msg.histogramIntervalMs);
                break;
            case 'updateVariable':
                if (msg.variable) {
                    varNameEl.textContent = msg.variable;
                    varNameEl.classList.remove('empty');
                    let meta = `Line ${msg.line}`;
                    if (msg.type) meta += ` <span class="type-badge">${msg.type}</span>`;
                    varMetaEl.innerHTML = meta;
                } else {
                    varNameEl.textContent = 'Select an expression in the editor';
                    varNameEl.classList.add('empty');
                    varMetaEl.innerHTML = '';
                }
                break;

            case 'inspectorStatus':
                applyStatus(msg.message || '', msg.status);
                break;

            case 'pixelValue':
                if (msg.rgba) {
                    const [r, g, b, a] = msg.rgba;
                    const r8 = Math.round(r * 255), g8 = Math.round(g * 255),
                          b8 = Math.round(b * 255), a8 = Math.round(a * 255);
                    colorSwatch.style.background = `rgba(${r8},${g8},${b8},${a / 1})`;
                    pixelValues.innerHTML =
                        `<span class="ch-r">R: ${r.toFixed(4)}</span><br/>` +
                        `<span class="ch-g">G: ${g.toFixed(4)}</span><br/>` +
                        `<span class="ch-b">B: ${b.toFixed(4)}</span><br/>` +
                        `<span class="ch-a">A: ${a.toFixed(4)}</span>`;
                }
                break;

            case 'histogram':
                if (msg.histogram) drawHistogram(msg.histogram);
                break;
        }
    });

    setHoverUi(hoverToggle.checked);
    setHistogramUi(histogramToggle.checked);
    setHistogramIntervalUi(DEFAULT_HISTOGRAM_INTERVAL_MS);
    if (vscode) {
        vscode.postMessage({ command: 'panelReady' });
    }

    function normalizeCropRange() {
        const minValue = Number.parseFloat(rangeMin.value);
        const maxValue = Number.parseFloat(rangeMax.value);
        if (!Number.isFinite(minValue) && !Number.isFinite(maxValue)) {
            return { min: 0, max: 1 };
        }
        if (!Number.isFinite(minValue)) {
            return { min: maxValue, max: maxValue };
        }
        if (!Number.isFinite(maxValue)) {
            return { min: minValue, max: minValue };
        }
        return minValue <= maxValue
            ? { min: minValue, max: maxValue }
            : { min: maxValue, max: minValue };
    }

    function mapValueToX(value, domainMin, domainMax, width) {
        const span = domainMax - domainMin;
        if (Math.abs(span) <= 1e-9) {
            return width * 0.5;
        }
        return ((value - domainMin) / span) * width;
    }

    function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
    }

    function createOverlayPattern(colorA, colorB) {
        const tile = document.createElement('canvas');
        tile.width = 8;
        tile.height = 8;
        const ctx = tile.getContext('2d');
        if (!ctx) return colorA;
        ctx.fillStyle = colorA;
        ctx.fillRect(0, 0, 8, 8);
        ctx.fillStyle = colorB;
        ctx.fillRect(0, 0, 4, 4);
        ctx.fillRect(4, 4, 4, 4);
        return histCtx.createPattern(tile, 'repeat') || colorA;
    }

    function drawCropOverlays(W, H, domainMin, domainMax, cropMin, cropMax) {
        const leftEdge = clamp(mapValueToX(cropMin, domainMin, domainMax, W), 0, W);
        const rightEdge = clamp(mapValueToX(cropMax, domainMin, domainMax, W), 0, W);
        const leftPattern = createOverlayPattern('rgba(255, 0, 255, 0.10)', 'rgba(255, 0, 255, 0.18)');
        const rightPattern = createOverlayPattern('rgba(0, 255, 255, 0.10)', 'rgba(0, 255, 255, 0.18)');

        if (leftEdge > 0) {
            histCtx.fillStyle = leftPattern;
            histCtx.fillRect(0, 0, leftEdge, H);
        }
        if (rightEdge < W) {
            histCtx.fillStyle = rightPattern;
            histCtx.fillRect(rightEdge, 0, W - rightEdge, H);
        }

        histCtx.save();
        histCtx.setLineDash([4, 4]);
        histCtx.lineWidth = 1;
        histCtx.strokeStyle = 'rgba(255, 0, 255, 0.70)';
        histCtx.beginPath();
        histCtx.moveTo(leftEdge + 0.5, 0);
        histCtx.lineTo(leftEdge + 0.5, H);
        histCtx.stroke();

        histCtx.strokeStyle = 'rgba(0, 255, 255, 0.70)';
        histCtx.beginPath();
        histCtx.moveTo(rightEdge + 0.5, 0);
        histCtx.lineTo(rightEdge + 0.5, H);
        histCtx.stroke();
        histCtx.restore();

        return { leftEdge, rightEdge };
    }

    function evaluateCurve(mode, t) {
        const clamped = clamp(t, 0, 1);
        if (mode === 'sigmoid') {
            return 1 / (1 + Math.exp(-8 * (2 * clamped - 1)));
        }
        if (mode === 'log') {
            return Math.log2(1 + clamped * 255) / Math.log2(256);
        }
        return clamped;
    }

    function drawMappingCurves(W, H, domainMin, domainMax, cropMin, cropMax) {
        const startValue = Math.max(domainMin, cropMin);
        const endValue = Math.min(domainMax, cropMax);
        if (!(endValue > startValue)) return;

        const styleByMode = {
            linear: { color: 'rgba(255, 255, 255, 0.95)' },
            sigmoid: { color: 'rgba(255, 192, 96, 0.95)' },
            log: { color: 'rgba(144, 208, 255, 0.95)' }
        };
        const activeStyle = styleByMode[currentMode] || styleByMode.linear;

        const steps = Math.max(32, Math.floor(W / 3));
        const cropSpan = Math.abs(cropMax - cropMin) > 1e-9 ? (cropMax - cropMin) : 1;

        histCtx.save();
        histCtx.lineWidth = 2;
        histCtx.strokeStyle = activeStyle.color;
        histCtx.beginPath();
        for (let i = 0; i <= steps; i++) {
            const value = startValue + ((endValue - startValue) * i / steps);
            const normalized = (value - cropMin) / cropSpan;
            const mapped = evaluateCurve(currentMode, normalized);
            const x = mapValueToX(value, domainMin, domainMax, W);
            const y = H - mapped * (H - 2) - 1;
            if (i === 0) histCtx.moveTo(x, y);
            else histCtx.lineTo(x, y);
        }
        histCtx.stroke();
        histCtx.restore();
    }

    // ── Histogram renderer ─────────────────────────
    function drawHistogram(h) {
        if (!histCanvas || !histCtx) return;
        lastHistogram = h;

        // Size canvas to container (DPR-aware)
        const wrap = histCanvas.parentElement;
        const dpr = window.devicePixelRatio || 1;
        const cw = wrap.clientWidth, ch = wrap.clientHeight;
        histCanvas.width = cw * dpr;
        histCanvas.height = ch * dpr;
        histCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

        const W = cw, H = ch;
        const bins = h.bins || 128;
        const domainMin = Number.isFinite(h.autoMin) ? h.autoMin : 0;
        const domainMax = Number.isFinite(h.autoMax) ? h.autoMax : 1;
        const cropRange = normalizeCropRange();

        // Clear
        histCtx.clearRect(0, 0, W, H);

        // Find global max across all channels for vertical scaling
        let peak = 1;
        for (let i = 0; i < bins; i++) {
            if (h.binsR[i] > peak) peak = h.binsR[i];
            if (h.binsG[i] > peak) peak = h.binsG[i];
            if (h.binsB[i] > peak) peak = h.binsB[i];
        }

        const barW = W / bins;
        const pad = H * 0.05;  // 5% bottom padding

        // Draw channels (B, G, R order so red is on top)
        const channels = [
            { data: h.binsB, color: 'rgba(86, 156, 214, 0.6)' },
            { data: h.binsG, color: 'rgba(78, 201, 176, 0.6)' },
            { data: h.binsR, color: 'rgba(244, 71, 71, 0.55)' }
        ];

        for (const ch of channels) {
            histCtx.fillStyle = ch.color;
            histCtx.beginPath();
            histCtx.moveTo(0, H);
            for (let i = 0; i < bins; i++) {
                const barH = (ch.data[i] / peak) * (H - pad);
                const x = i * barW;
                histCtx.lineTo(x, H - barH);
                histCtx.lineTo(x + barW, H - barH);
            }
            histCtx.lineTo(W, H);
            histCtx.closePath();
            histCtx.fill();
        }

        drawCropOverlays(W, H, domainMin, domainMax, cropRange.min, cropRange.max);
        drawMappingCurves(W, H, domainMin, domainMax, cropRange.min, cropRange.max);

        // Stats labels
        histMinEl.textContent = domainMin.toFixed(2);
        histMaxEl.textContent = domainMax.toFixed(2);
        histSamplesEl.textContent = `Samples: ${h.samples}px / Time: ${(Number(h.timeMs) || 0).toFixed(2)}ms`;
    }
})();
</script>
</body>
</html>
